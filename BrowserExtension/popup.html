<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Usage HUD</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 220px;
        margin: 0;
        padding: 16px;
        text-align: center;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 12px;
        opacity: 0.7;
      }
      .pct {
        font-size: 40px;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 4px;
      }
      .bar {
        height: 8px;
        border-radius: 4px;
        background: rgba(127, 127, 127, 0.25);
        overflow: hidden;
        margin: 12px 0 8px;
      }
      .bar > span {
        display: block;
        height: 100%;
        width: 0;
        border-radius: 4px;
        transition: width 0.3s ease;
      }
      .status {
        font-size: 11px;
        opacity: 0.65;
      }
      .status.bad {
        color: #d9534f;
        opacity: 1;
      }
      .muted {
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <h1>Claude Usage HUD</h1>
    <div class="pct" id="pct">—</div>
    <div class="bar"><span id="bar"></span></div>
    <div class="status" id="status">Loading…</div>
    <script src="popup.js"></script>
  </body>
</html>
